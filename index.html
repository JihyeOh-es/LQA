<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스페인어 LQA</title>
<style>
  /* === 스타일: 의도적으로 맨몸 (나중에 입힐 자리) === */
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 760px; margin: 0 auto; padding: 24px;
    color: #222; line-height: 1.5;
  }
  h1 { font-size: 20px; font-weight: 600; }
  h2 { font-size: 16px; font-weight: 600; margin-top: 28px; color: #333; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
  input, select { padding: 7px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
  input { flex: 1; min-width: 120px; }
  button { padding: 7px 14px; border: 1px solid #999; border-radius: 6px; background: #fff; cursor: pointer; font-size: 14px; }
  button:hover { background: #f2f2f2; }
  .term { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 10px 0; border-top: 1px solid #eee; }
  .term-main { font-size: 15px; }
  .term-note { font-size: 13px; color: #666; }
  .del { border-color: #ddd; color: #999; padding: 4px 10px; }
  .muted { color: #888; font-size: 13px; }

  /* === 탭 버튼 === */
  #tabs { display: flex; gap: 4px; margin-bottom: 18px; border-bottom: 1px solid #eee; }
  .tab-btn {
    border: none; background: transparent; padding: 9px 14px; margin-bottom: -1px;
    color: #888; font-size: 14px; border-bottom: 2px solid transparent; border-radius: 0;
  }
  .tab-btn:hover { background: transparent; color: #555; }
  .tab-btn.active { color: #3C3489; font-weight: 600; border-bottom-color: #7F77DD; }

  /* === 태그: 상태 (어떻게 쓰는가 — 색 알약) === */
  .status { font-size: 12px; padding: 2px 9px; border-radius: 20px; font-weight: 500; }
  .status-권장 { background: #e6f4ea; color: #1e7e34; }
  .status-주의 { background: #fdf3d8; color: #9a6700; }
  .status-금지 { background: #fdecea; color: #c0392b; }

  /* === 태그: 소속 (어디 것인가 — 윤곽 칩) === */
  .scope-tag {
    font-size: 12px; padding: 2px 9px; border-radius: 6px;
    border: 1px solid #AFA9EC; color: #534AB7; background: transparent;
    display: inline-flex; align-items: center; gap: 3px;
  }

  /* === 프로젝트 띠 (선택 후 상단) === */
  #p-band {
    background: #EEEDFE;
    border: none;
    border-bottom: 2px solid #7F77DD;
    border-radius: 8px 8px 0 0;
    padding: 12px 16px;
    margin-bottom: 20px;
  }
  #p-band .term-main { color: #3C3489; font-weight: 600; font-size: 16px; }
  #p-band .genre-pill { font-size: 12px; padding: 2px 9px; border-radius: 20px; background: #fff; color: #534AB7; }
  #p-band .del {
    border-color: #AFA9EC; color: #534AB7; background: transparent;
  }

  /* === 프로젝트 선택 목록 === */
  #p-list .term {
    border: 1px solid #e4e4e4; border-top: 1px solid #e4e4e4;
    border-radius: 8px; padding: 11px 14px; margin-bottom: 6px;
    transition: border-color .12s, background .12s;
  }
  #p-list .term:hover { border-color: #AFA9EC; background: #faf9ff; }
  #p-list .genre-pill { font-size: 12px; padding: 2px 9px; border-radius: 20px; background: #eee; color: #555; }

  /* === 인라인 경고 (빨간 메시지 + 후보) === */
  .warn-box { display: none; }
  .warn-box .warn-msg { color: #c0392b; font-size: 13px; margin-bottom: 8px; }
  .warn-box .cand {
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
    font-size: 13px; padding: 8px 10px; border: 1px solid #f3c9c4;
    background: #fdf3f2; border-radius: 6px; margin-bottom: 6px;
  }
  .warn-box .cand .where { color: #888; font-size: 12px; }
  .warn-box .cand button, .warn-box .new-btn { font-size: 12px; padding: 4px 10px; }
  .warn-box .new-btn { border-color: #7F77DD; color: #534AB7; }
  #p-warn { margin: -2px 0 12px; }
  #g-warn { margin: -2px 0 12px; }

  /* === 구역 묶기: 글로서리 카드 === */
  #glossary-section {
    border: 1px solid #eee; border-radius: 10px;
    padding: 4px 18px 18px; margin-bottom: 24px;
  }

  /* === 삭제 확인 모달 === */
  #modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    align-items: center; justify-content: center; z-index: 10;
  }
  #modal {
    background: #fff; border-radius: 12px; padding: 22px 24px;
    max-width: 360px; width: 90%;
  }
  #modal .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
  #modal .modal-msg { font-size: 14px; color: #555; margin-bottom: 18px; }
  #modal .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  #modal .confirm { border-color: #c0392b; color: #c0392b; }
</style>
</head>
<body>

<h1>스페인어 LQA</h1>

<!-- === 프로젝트: 현재 선택 띠 (선택 후 표시) === -->
<div id="p-band" class="term" style="display:none;"></div>

<!-- === 프로젝트: 선택 화면 (선택 전 표시) === -->
<div id="p-select">
  <h2>프로젝트 선택</h2>
  <div class="row">
    <input id="p-name" placeholder="작업 이름 (예: 쿠키런 ES)" list="p-name-suggest">
    <datalist id="p-name-suggest"></datalist>
    <input id="p-genre" placeholder="장르 (예: 게임)" list="p-genre-suggest">
    <datalist id="p-genre-suggest"></datalist>
    <button id="p-add">추가</button>
  </div>
  <div id="p-warn" class="warn-box"></div>
  <div id="p-list"></div>
</div>

  <!-- === 탭 (프로젝트 선택 후 표시) === -->
<div id="tabs" style="display:none;">
  <button class="tab-btn" data-tab="glossary">글로서리</button>
  <button class="tab-btn" data-tab="style">스타일</button>
  <button class="tab-btn" data-tab="character">캐릭터</button>
  <button class="tab-btn" data-tab="qa">QA</button>
</div>
  
<!-- === 글로서리 (프로젝트 선택 후 표시) === -->
<div id="glossary-section" style="display:none;">
<h2>글로서리</h2>
<div class="row">
  <input id="g-source" placeholder="원문 (예: Guild)">
  <input id="g-target" placeholder="번역 (예: Gremio)">
</div>
<div class="row">
  <select id="g-status">
    <option value="권장">권장</option>
    <option value="주의">주의</option>
    <option value="금지">금지</option>
  </select>
  <input id="g-note" placeholder="메모 (선택)">
  <button id="g-add">추가</button>
</div>

<div id="g-warn" class="warn-box"></div>
<div id="g-list"></div>
</div>

<!-- === 스타일/캐릭터/QA (준비 중) === -->
<div id="style-section" style="display:none;">
<h2>스타일 가이드</h2>
<div class="row">
  <input id="s-title" placeholder="제목 (예: 반말체로 통일)">
  <input id="s-item" placeholder="항목 (예: UI, 컷신)" list="s-item-suggest">
  <datalist id="s-item-suggest"></datalist>
</div>
<div class="row">
  <input id="s-content" placeholder="내용 (어떤 결정인지)">
  <button id="s-add">추가</button>
</div>
<div id="s-list"></div>
</div>
<div id="character-section" style="display:none;"><h2>캐릭터</h2><p class="muted">곧 만들 거예요.</p></div>
<div id="qa-section" style="display:none;"><h2>QA 로그</h2><p class="muted">곧 만들 거예요.</p></div>

<h2>내보내기</h2>
<button id="export">전체 JSON 내보내기</button>

<!-- === 삭제 확인 모달 === -->
<div id="modal-overlay">
  <div id="modal">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-msg" id="modal-msg"></div>
    <div class="modal-btns">
      <button id="modal-cancel">취소</button>
      <button id="modal-confirm" class="confirm">삭제</button>
    </div>
  </div>
</div>

<script>
/* === 데이터층: 평평한 배열 + localStorage === */
const KEY = "spanish-lqa-db";

const db = {
  meta: { version: 1 },
  projects: [],
  terms: [],
  decisions: [],
  characters: [],
  findings: [],
  whitelist: []
};

function load() {
  const raw = localStorage.getItem(KEY);
  if (!raw) return;
  try {
    Object.assign(db, JSON.parse(raw));
  } catch (e) {
    console.error("저장 데이터 읽기 실패:", e);
  }
}

function save() { localStorage.setItem(KEY, JSON.stringify(db)); }

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

/* === 프로젝트: 추가 (이름+장르 둘 다 같으면 중복) === */
function addProject() {
  const name = document.getElementById("p-name").value.trim();
  const genre = document.getElementById("p-genre").value.trim();
  if (!name) return;

  const dup = db.projects.find(p => p.name === name && p.genre === genre);
  if (dup) {
    showProjectWarn(name, genre);
    return;
  }

  db.projects.push({ id: uid(), name, genre, createdAt: Date.now() });
  save();
  document.getElementById("p-name").value = "";
  document.getElementById("p-genre").value = "";
  clearWarn("p-warn");
  renderProjects();
}

function showProjectWarn(name, genre) {
  const warn = document.getElementById("p-warn");
  warn.style.display = "block";
  warn.innerHTML =
    '<div class="warn-msg">\'' + esc(name) +
    (genre ? ' (' + esc(genre) + ')' : '') +
    '\'\ub294 \uc774\ubbf8 \uc788\ub294 \ud504\ub85c\uc81d\ud2b8\uc608\uc694.</div>';
}

/* === 프로젝트: 삭제 (확인 모달) === */
function deleteProject(id) {
  const p = db.projects.find(x => x.id === id);
  openModal(
    "\ud504\ub85c\uc81d\ud2b8 \uc0ad\uc81c",
    "'" + (p ? p.name : "") + "' \ud504\ub85c\uc81d\ud2b8\ub97c \uc0ad\uc81c\ud560\uae4c\uc694?",
    () => {
      db.projects = db.projects.filter(x => x.id !== id);
      save();
      renderProjects();
    }
  );
}

/* === 프로젝트: 현재 선택 상태 === */
let currentTab = "glossary";
const TABS = ["glossary", "style", "character", "qa"];

function switchTab(name) {
  currentTab = name;
  TABS.forEach(t => {
    if (name === "style") renderDecisions();
    document.getElementById(t + "-section").style.display = (t === name) ? "block" : "none";
  });
  document.querySelectorAll(".tab-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.tab === name);
  });
}  
let currentProjectId = null;
let projectChosen = false;

function selectProject(id) {
  currentProjectId = id;
  projectChosen = true;
  renderProjectArea();
}
function showSelector() { projectChosen = false; renderProjectArea(); }

function projectName(id) {
  if (id === null) return "공통";
  const p = db.projects.find(p => p.id === id);
  return p ? p.name : "공통";
}
function projectGenre(id) {
  if (id === null) return "모든 작업 공용";
  const p = db.projects.find(p => p.id === id);
  return p ? p.genre : "";
}

/* === 프로젝트: 화면 전환 === */
function renderProjectArea() {
  const band = document.getElementById("p-band");
  const selectEl = document.getElementById("p-select");
  const glossary = document.getElementById("glossary-section");

  if (projectChosen) {
    selectEl.style.display = "none";
    document.getElementById("tabs").style.display = "flex";
    switchTab(currentTab);
    band.style.display = "flex";
    const genre = projectGenre(currentProjectId);
    band.innerHTML =
      '<div class="term-main">' + esc(projectName(currentProjectId)) +
      (genre ? ' <span class="genre-pill">' + esc(genre) + '</span>' : '') + '</div>' +
      '<button id="p-change" class="del">\ubc14\uafb8\uae30</button>';
    document.getElementById("p-change").onclick = showSelector;
    clearWarn("g-warn");
    renderTerms();
  } else {
    band.style.display = "none";
    glossary.style.display = "none";
    document.getElementById("tabs").style.display = "none";
    selectEl.style.display = "block";
    renderProjects();
  }
}

/* === 프로젝트: 선택 목록 === */
function renderProjects() {
  const list = document.getElementById("p-list");
  list.innerHTML = "";
  list.appendChild(projectRow(null, "공통", "모든 작업 공용", false));
  db.projects.forEach(p => list.appendChild(projectRow(p.id, p.name, p.genre, true)));

  document.getElementById("p-name-suggest").innerHTML =
    db.projects.map(p => '<option value="' + esc(p.name) + '">' + esc(p.genre || "") + '</option>').join("");
  const genres = [...new Set(db.projects.map(p => p.genre).filter(Boolean))];
  document.getElementById("p-genre-suggest").innerHTML =
    genres.map(g => '<option value="' + esc(g) + '">').join("");
}

function projectRow(id, name, sub, deletable) {
  const row = document.createElement("div");
  row.className = "term";
  row.style.cursor = "pointer";
  row.onclick = () => selectProject(id);

  const left = document.createElement("div");
  left.innerHTML =
    '<div class="term-main">' + esc(name) +
    (sub ? ' <span class="genre-pill">' + esc(sub) + '</span>' : '') + '</div>';
  row.appendChild(left);

  if (deletable) {
    const del = document.createElement("button");
    del.className = "del";
    del.textContent = "\uc0ad\uc81c";
    del.onclick = (e) => { e.stopPropagation(); deleteProject(id); };
    row.appendChild(del);
  }
  return row;
}

/* === 프로젝트 이름 입력 시 장르 자동 채움 === */
function autofillGenre() {
  const name = document.getElementById("p-name").value.trim();
  const match = db.projects.find(p => p.name === name);
  if (match && match.genre) document.getElementById("p-genre").value = match.genre;
}

/* === 글로서리: 추가 시도 === */
function tryAddTerm() {
  const source = document.getElementById("g-source").value.trim();
  const target = document.getElementById("g-target").value.trim();
  if (!source || !target) return;

  const candidates = db.terms.filter(t =>
    t.source === source &&
    (t.projectId === currentProjectId || t.projectId === null)
  );

  if (candidates.length === 0) { commitNewTerm(source, target); return; }

  const exact = candidates.find(t => t.target === target);
  if (exact) { showTermWarn(source, target, candidates, true); return; }

  showTermWarn(source, target, candidates, false);
}

function commitNewTerm(source, target) {
  db.terms.push({
    id: uid(),
    projectId: currentProjectId,
    source, target,
    status: document.getElementById("g-status").value,
    note: document.getElementById("g-note").value.trim(),
    createdAt: Date.now()
  });
  save();
  clearTermInputs();
  renderTerms();
}

function overwriteTerm(id) {
  const t = db.terms.find(x => x.id === id);
  if (!t) return;
  t.target = document.getElementById("g-target").value.trim();
  t.status = document.getElementById("g-status").value;
  const note = document.getElementById("g-note").value.trim();
  if (note) t.note = note;
  save();
  clearTermInputs();
  renderTerms();
}

function clearTermInputs() {
  document.getElementById("g-source").value = "";
  document.getElementById("g-target").value = "";
  document.getElementById("g-note").value = "";
  clearWarn("g-warn");
}

function showTermWarn(source, target, candidates, sameTarget) {
  const warn = document.getElementById("g-warn");
  warn.style.display = "block";

  if (sameTarget) {
    warn.innerHTML =
      '<div class="warn-msg">\'' + esc(source) + ' \u2192 ' + esc(target) + '\'\ub294 \uc774\ubbf8 \uc788\uc5b4\uc694.</div>';
    return;
  }

  let html = '<div class="warn-msg">\'' + esc(source) +
    '\'\uac00 \uc774\ubbf8 \uc788\uc5b4\uc694. \ub36e\uc5b4\uc4f8 \ub300\uc0c1\uc744 \uace0\ub974\uac70\ub098 \uc2e0\uaddc\ub85c \ucd94\uac00\ud558\uc138\uc694.</div>';
  candidates.forEach(t => {
    const where = t.projectId === null ? "\uacf5\ud1b5" : projectName(t.projectId);
    html +=
      '<div class="cand">' +
        '<span>' + esc(t.source) + ' \u2192 <b>' + esc(t.target) + '</b> ' +
        '<span class="where">[' + esc(where) + ']</span></span>' +
        '<button onclick="overwriteTerm(\'' + t.id + '\')">\uc774\uac78 \ub36e\uc5b4\uc4f0\uae30</button>' +
      '</div>';
  });
  html += '<button class="new-btn" onclick="commitNewTerm(\'' +
    escAttr(source) + '\',\'' + escAttr(target) + '\')">\uc2e0\uaddc\ub85c \ucd94\uac00</button>';
  warn.innerHTML = html;
}

/* === 스타일 가이드: 추가 === */
function addDecision() {
  const title = document.getElementById("s-title").value.trim();
  const content = document.getElementById("s-content").value.trim();
  if (!title) return;

  db.decisions.push({
    id: uid(),
    projectId: currentProjectId,
    title,
    content,
    item: document.getElementById("s-item").value.trim(),
    createdAt: Date.now()
  });
  save();
  document.getElementById("s-title").value = "";
  document.getElementById("s-content").value = "";
  document.getElementById("s-item").value = "";
  renderDecisions();
}

/* === 스타일 가이드: 삭제 (공통/프로젝트 둘 다 확인) === */
function deleteDecision(id) {
  const d = db.decisions.find(x => x.id === id);
  if (!d) return;
  const isCommon = d.projectId === null;
  openModal(
    "스타일 삭제",
    isCommon
      ? "'" + d.title + "'는 [공통] 결정이에요. 삭제하면 모든 작업에서 사라져요. 정말 삭제할까요?"
      : "'" + d.title + "'를 삭제할까요?",
    () => {
      db.decisions = db.decisions.filter(x => x.id !== id);
      save();
      renderDecisions();
    }
  );
}

/* === 스타일 가이드: 목록 (필터 + 공통 태그) === */
function renderDecisions() {
  const list = document.getElementById("s-list");

  const visible = db.decisions.filter(d => {
    if (currentProjectId === null) return d.projectId === null;
    return d.projectId === currentProjectId || d.projectId === null;
  });

  // 항목 자동완성 제안
  const items = [...new Set(db.decisions.map(d => d.item).filter(Boolean))];
  document.getElementById("s-item-suggest").innerHTML =
    items.map(i => '<option value="' + esc(i) + '">').join("");

  if (visible.length === 0) {
    list.innerHTML = '<p class="muted">아직 스타일 결정이 없어요.</p>';
    return;
  }
  list.innerHTML = "";
  visible.forEach(d => {
    const el = document.createElement("div");
    el.className = "term";
    const showScope = (currentProjectId !== null && d.projectId === null);

    const left = document.createElement("div");
    left.innerHTML =
      '<div class="term-main"><b>' + esc(d.title) + '</b>' +
      (d.item ? ' <span class="status status-주의">' + esc(d.item) + '</span>' : '') +
      (showScope ? ' <span class="scope-tag">◇ 공통</span>' : '') +
      '</div>' +
      (d.content ? '<div class="term-note">' + esc(d.content) + '</div>' : '');

    const del = document.createElement("button");
    del.className = "del";
    del.textContent = "삭제";
    del.onclick = () => deleteDecision(d.id);

    el.appendChild(left);
    el.appendChild(del);
    list.appendChild(el);
  });
}
  
/* === 글로서리: 삭제 (공통/프로젝트 둘 다 확인) === */
function deleteTerm(id) {
  const t = db.terms.find(x => x.id === id);
  if (!t) return;
  const isCommon = t.projectId === null;
  openModal(
    "\uc6a9\uc5b4 \uc0ad\uc81c",
    isCommon
      ? "'" + t.source + " \u2192 " + t.target + "'\ub294 [\uacf5\ud1b5] \uc6a9\uc5b4\uc608\uc694. \uc0ad\uc81c\ud558\uba74 \ubaa8\ub4e0 \uc791\uc5c5\uc5d0\uc11c \uc0ac\ub77c\uc838\uc694. \uc815\ub9d0 \uc0ad\uc81c\ud560\uae4c\uc694?"
      : "'" + t.source + " \u2192 " + t.target + "'\ub97c \uc0ad\uc81c\ud560\uae4c\uc694?",
    () => {
      db.terms = db.terms.filter(x => x.id !== id);
      save();
      renderTerms();
    }
  );
}

/* === 글로서리: 목록 (필터 + 공통 태그) === */
function renderTerms() {
  const list = document.getElementById("g-list");

  const visible = db.terms.filter(t => {
    if (currentProjectId === null) return t.projectId === null;
    return t.projectId === currentProjectId || t.projectId === null;
  });

  if (visible.length === 0) {
    list.innerHTML = '<p class="muted">\uc544\uc9c1 \uc6a9\uc5b4\uac00 \uc5c6\uc5b4\uc694.</p>';
    return;
  }
  list.innerHTML = "";
  visible.forEach(t => {
    const el = document.createElement("div");
    el.className = "term";

    // 프로젝트 화면에서, 공통에서 온 용어에만 [공통] 태그
    const showScope = (currentProjectId !== null && t.projectId === null);

    const left = document.createElement("div");
    left.innerHTML =
      '<div class="term-main">' + esc(t.source) + ' \u2192 <b>' + esc(t.target) + '</b> ' +
      '<span class="status status-' + esc(t.status) + '">' + esc(t.status) + '</span>' +
      (showScope ? ' <span class="scope-tag">\u25C7 \uacf5\ud1b5</span>' : '') +
      '</div>' +
      (t.note ? '<div class="term-note">' + esc(t.note) + '</div>' : '');

    const del = document.createElement("button");
    del.className = "del";
    del.textContent = "\uc0ad\uc81c";
    del.onclick = () => deleteTerm(t.id);

    el.appendChild(left);
    el.appendChild(del);
    list.appendChild(el);
  });
}

/* === 공통: 인라인 경고 닫기 === */
function clearWarn(id) {
  const w = document.getElementById(id);
  w.style.display = "none";
  w.innerHTML = "";
}

/* === 공통: 삭제 확인 모달 === */
let modalAction = null;
function openModal(title, msg, onConfirm) {
  document.getElementById("modal-title").textContent = title;
  document.getElementById("modal-msg").textContent = msg;
  modalAction = onConfirm;
  document.getElementById("modal-overlay").style.display = "flex";
}
function closeModal() {
  document.getElementById("modal-overlay").style.display = "none";
  modalAction = null;
}

/* === 내보내기 === */
function exportJSON() {
  const blob = new Blob([JSON.stringify(db, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "spanish-lqa-backup.json"; a.click();
  URL.revokeObjectURL(url);
}

/* === 헬퍼 === */
function esc(s) {
  return String(s).replace(/[&<>"]/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}
function escAttr(s) {
  return String(s).replace(/\\/g, "\\\\").replace(/'/g, "\\'");
}

/* === 시작 === */
document.getElementById("p-add").onclick = addProject;
document.getElementById("p-name").addEventListener("change", autofillGenre);
document.getElementById("g-add").onclick = tryAddTerm;
document.getElementById("s-add").onclick = addDecision;
document.querySelectorAll(".tab-btn").forEach(b => {
  b.onclick = () => switchTab(b.dataset.tab);
});  
document.getElementById("export").onclick = exportJSON;
document.getElementById("modal-cancel").onclick = closeModal;
document.getElementById("modal-confirm").onclick = () => { if (modalAction) modalAction(); closeModal(); };
document.getElementById("modal-overlay").onclick = (e) => { if (e.target.id === "modal-overlay") closeModal(); };
load();
renderProjectArea();
</script>
