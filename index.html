<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스페인어 LQA</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  /* === 스타일: 의도적으로 맨몸 (나중에 입힐 자리) === */
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 760px; margin: 0 auto; padding: 24px;
    color: #222; line-height: 1.5;
  }
  h1 { font-size: 20px; font-weight: 600; }
  h2 { font-size: 16px; font-weight: 600; margin-top: 28px; color: #333; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
  input, select { padding: 7px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
  input { flex: 1; min-width: 120px; }
  button { padding: 7px 14px; border: 1px solid #999; border-radius: 6px; background: #fff; cursor: pointer; font-size: 14px; }
  button:hover { background: #f2f2f2; }
  .term { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 10px 0; border-top: 1px solid #eee; }
  .term-main { font-size: 15px; }
  .term-note { font-size: 13px; color: #666; }
  .del { border-color: #ddd; color: #999; padding: 4px 10px; }
  .muted { color: #888; font-size: 13px; }

  /* === 탭 제목 줄 (제목 좌 + 추가버튼 우) === */
  .section-head { display: flex; justify-content: space-between; align-items: center; }
  .add-btn {
    background: #5D54C2; color: #fff; border: none; font-weight: 500;
  }
  .add-btn:hover { background: #4f47ad; }

  /* === 헤더 === */
  .app-head { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-mark { width: 30px; height: 30px; border-radius: 8px; background: #EEEDFE; color: #5D54C2; font-weight: 600; display: flex; align-items: center; justify-content: center; }
  .logo-word { font-size: 17px; font-weight: 600; }
  .cabinet-btn { margin-left: auto; color: #534AB7; border-color: #AFA9EC; }

  /* === 검사 기준 줄 === */
  .criteria-bar { display: flex; align-items: center; gap: 10px; background: #f5f4ed; padding: 12px 14px; border-radius: 8px; margin-bottom: 18px; }
  .criteria-label { font-size: 13px; color: #888; }
  #criteria-select { flex: 0 1 auto; }

  /* === 탭 버튼 === */
  #tabs { display: flex; gap: 4px; margin-bottom: 18px; border-bottom: 1px solid #eee; }
  .tab-btn {
    border: none; background: transparent; padding: 9px 14px; margin-bottom: -1px;
    color: #888; font-size: 14px; border-bottom: 2px solid transparent; border-radius: 0;
  }
  .tab-btn:hover { background: transparent; color: #555; }
  .tab-btn.active { color: #3C3489; font-weight: 600; border-bottom-color: #7F77DD; }

  /* === 태그: 상태 (어떻게 쓰는가 — 색 알약) === */
  .status { font-size: 12px; padding: 2px 9px; border-radius: 20px; font-weight: 500; }
  .status-권장 { background: #e6f4ea; color: #1e7e34; }
  .status-주의 { background: #fdf3d8; color: #9a6700; }
  .status-금지 { background: #fdecea; color: #c0392b; }

  /* === 태그: 소속 (어디 것인가 — 윤곽 칩) === */
  .scope-tag {
    font-size: 12px; padding: 2px 9px; border-radius: 6px;
    border: 1px solid #AFA9EC; color: #534AB7; background: transparent;
    display: inline-flex; align-items: center; gap: 3px;
  }

  /* === 프로젝트 띠 (선택 후 상단) === */
  #p-band {
    background: #EEEDFE;
    border: none;
    border-bottom: 2px solid #7F77DD;
    border-radius: 8px 8px 0 0;
    padding: 12px 16px;
    margin-bottom: 20px;
  }
  #p-band .term-main { color: #3C3489; font-weight: 600; font-size: 16px; }
  #p-band .genre-pill { font-size: 12px; padding: 2px 9px; border-radius: 20px; background: #fff; color: #534AB7; }
  #p-band .del {
    border-color: #AFA9EC; color: #534AB7; background: transparent;
  }

  /* === 프로젝트 선택 목록 === */
  #p-list .term {
    border: 1px solid #e4e4e4; border-top: 1px solid #e4e4e4;
    border-radius: 8px; padding: 11px 14px; margin-bottom: 6px;
    transition: border-color .12s, background .12s;
  }
  #p-list .term:hover { border-color: #AFA9EC; background: #faf9ff; }
  #p-list .genre-pill { font-size: 12px; padding: 2px 9px; border-radius: 20px; background: #eee; color: #555; }

  /* === 인라인 경고 (빨간 메시지 + 후보) === */
  .warn-box { display: none; }
  .warn-box .warn-msg { color: #c0392b; font-size: 13px; margin-bottom: 8px; }
  .warn-box .cand {
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
    font-size: 13px; padding: 8px 10px; border: 1px solid #f3c9c4;
    background: #fdf3f2; border-radius: 6px; margin-bottom: 6px;
  }
  .warn-box .cand .where { color: #888; font-size: 12px; }
  .warn-box .cand button, .warn-box .new-btn { font-size: 12px; padding: 4px 10px; }
  .warn-box .new-btn { border-color: #7F77DD; color: #534AB7; }
  #p-warn { margin: -2px 0 12px; }
  #g-warn { margin: -2px 0 12px; }

  /* === 구역 묶기: 글로서리 카드 === */
  #glossary-section {
    border: 1px solid #eee; border-radius: 10px;
    padding: 4px 18px 18px; margin-bottom: 24px;
  }

  /* === 삭제 확인 모달 === */
  #modal-overlay, #pmodal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    align-items: center; justify-content: center; z-index: 10;
  }
  #modal, #pmodal {
    background: #fff; border-radius: 12px; padding: 22px 24px;
    max-width: 360px; width: 90%;
  }
  #modal .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
  #modal .modal-msg { font-size: 14px; color: #555; margin-bottom: 18px; }
  #modal .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  #modal .confirm { border-color: #c0392b; color: #c0392b; }

/* === CSV 올리기 === */
  .import-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
  .import-label { font-size: 13px; color: #555; display: flex; align-items: center; gap: 5px; }
  .import-btn {
    font-size: 13px; color: #534AB7; border: 0.5px solid #AFA9EC;
    border-radius: 6px; padding: 6px 12px; cursor: pointer;
  }
  .import-btn:hover { background: #faf9ff; }
</style>
</style>
</head>
<body>

<!-- === 헤더: 로고 + 서랍장 토글 === -->
<div class="app-head">
  <div class="logo"><span class="logo-mark">L</span><span class="logo-word">Lince</span></div>
  <button id="cabinet-toggle" class="cabinet-btn"><i class="ti ti-folders"></i> 서랍장 열기</button>
</div>

<!-- === 검사 기준 (프로젝트 선택) === -->
<div class="criteria-bar">
  <span class="criteria-label">검사 기준</span>
  <select id="criteria-select"></select>
  <button id="p-new-btn" class="del">+ 새 프로젝트</button>
</div>

<!-- === 새 프로젝트 모달 === -->
<div id="pmodal-overlay">
  <div id="pmodal">
    <div class="modal-title">새 프로젝트</div>
    <div class="row"><input id="p-name" placeholder="작업 이름 (예: 쿠키런 ES)"></div>
    <div class="row"><input id="p-genre" placeholder="장르 (예: 게임)"></div>
    <div id="p-warn" class="warn-box"></div>
    <div class="modal-btns">
      <button id="pmodal-cancel">취소</button>
      <button id="pmodal-add" class="add-btn">추가</button>
    </div>
  </div>
</div>

<!-- === 검사기 (메인) === -->
<div id="checker-section">
  <div class="row" id="api-key-row">
    <input id="api-key" type="password" placeholder="Claude API 키 (sk-ant-...)" style="flex:1;">
    <button id="key-save" class="del">키 저장</button>
    <button id="key-test" class="del">연결 테스트</button>
  </div>
  <div id="key-status" class="muted" style="margin-bottom:12px;"></div>
  <h2>검사할 번역</h2>
  <div class="row">
    <textarea id="chk-source" placeholder="원문 붙여넣기…" rows="4" style="flex:1;"></textarea>
    <textarea id="chk-target" placeholder="번역 붙여넣기…" rows="4" style="flex:1;"></textarea>
  </div>
  <div class="section-head">
    <span class="muted">한 줄에 한 문장씩</span>
    <button id="chk-run" class="add-btn">검사</button>
  </div>
  <div id="chk-result"></div>
</div>

<!-- === 서랍장 (숨김, 토글) === -->
<div id="cabinet" style="display:none;">
<div id="tabs">
  <button class="tab-btn" data-tab="glossary">글로서리</button>
  <button class="tab-btn" data-tab="style">스타일</button>
  <button class="tab-btn" data-tab="character">캐릭터</button>
  <button class="tab-btn" data-tab="qa">QA</button>
</div>
  
<!-- === 글로서리 (프로젝트 선택 후 표시) === -->
<div id="glossary-section" style="display:none;">
<div class="section-head"><h2>글로서리</h2><button id="g-add" class="add-btn">추가</button></div>
  <div class="import-row">
  <label class="import-label"><input type="checkbox" id="g-import-overwrite"> 이미 있는 건 덮어쓰기</label>
  <label class="import-btn">CSV 올리기<input type="file" id="g-import" accept=".csv" hidden></label>
  <span id="g-import-status" class="muted"></span>
</div>
<div class="row">
  <input id="g-source" placeholder="원문 (예: Guild)">
  <input id="g-target" placeholder="번역 (예: Gremio)">
</div>
<div class="row">
  <select id="g-status">
    <option value="권장">권장</option>
    <option value="주의">주의</option>
    <option value="금지">금지</option>
  </select>
  <input id="g-note" placeholder="메모 (선택)">
</div>

<div id="g-warn" class="warn-box"></div>
<div id="g-list"></div>
</div>

<!-- === 스타일/캐릭터/QA (준비 중) === -->
<div id="style-section" style="display:none;">
<div class="section-head"><h2>스타일 가이드</h2><button id="s-add" class="add-btn">추가</button></div>
<div class="row">
  <select id="s-item-select" style="flex:1;">
    <option value="">항목 선택…</option>
    <option value="__new__">+ 새 항목</option>
  </select>
  <input id="s-item-new" placeholder="새 항목 이름" style="display:none;">
</div>
<div class="row">
  <input id="s-title" placeholder="제목 (예: 반말체로 통일)">
</div>
<div class="row">
  <input id="s-content" placeholder="내용 (어떤 결정인지)">
</div>
<div id="s-list"></div>
</div>
<div id="character-section" style="display:none;">
<div class="section-head"><h2>캐릭터 바이블</h2><button id="c-add" class="add-btn">추가</button></div>
<div class="row">
  <input id="c-source" placeholder="이름 (원문)">
  <input id="c-target" placeholder="이름 (번역)">
</div>
<div class="row">
  <input id="c-gender" placeholder="성별">
  <input id="c-age" placeholder="나이">
</div>
<div class="row"><input id="c-tone" placeholder="말투 (예: 반말, 활기차고 직설적)"></div>
<div class="row"><input id="c-rel" placeholder="관계 (예: 마법사맛의 형 / 악마맛과 라이벌)"></div>
<div class="row"><input id="c-habit" placeholder="말버릇 · 금지어"></div>
<div class="row"><input id="c-note" placeholder="메모 (선택)"></div>
<div id="c-warn" class="warn-box"></div>
<div id="c-list"></div>
</div>
<div id="qa-section" style="display:none;">
<div class="section-head"><h2>QA 로그</h2><button id="q-add" class="add-btn">추가</button></div>
<div class="row"><input id="q-source" placeholder="원문 문장"></div>
<div class="row"><input id="q-target" placeholder="번역 문장"></div>
<div class="row">
  <select id="q-cat-select" style="flex:1;">
    <option value="">분류 선택…</option>
    <option value="규칙">규칙</option>
    <option value="글로서리">글로서리</option>
    <option value="문법">문법</option>
    <option value="톤">톤</option>
    <option value="__new__">+ 새 분류</option>
  </select>
  <input id="q-cat-new" placeholder="새 분류 이름" style="display:none;">
  <select id="q-sev" style="flex:1;">
    <option value="경미">경미</option>
    <option value="주요">주요</option>
    <option value="심각">심각</option>
  </select>
</div>
<div class="row"><input id="q-fix" placeholder="수정안 (어떻게 고쳤나)"></div>
<div class="row"><input id="q-note" placeholder="메모 (선택)"></div>
<div id="q-list"></div>
</div>
</div>

<h2>내보내기</h2>
<button id="export">전체 JSON 내보내기</button>

<!-- === 삭제 확인 모달 === -->
<div id="modal-overlay">
  <div id="modal">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-msg" id="modal-msg"></div>
    <div class="modal-btns">
      <button id="modal-cancel">취소</button>
      <button id="modal-confirm" class="confirm">삭제</button>
    </div>
  </div>
</div>

<script>
/* === 데이터층: 평평한 배열 + localStorage === */
const KEY = "spanish-lqa-db";

const db = {
  meta: { version: 1 },
  projects: [],
  terms: [],
  decisions: [],
  characters: [],
  findings: [],
  whitelist: []
};

function load() {
  const raw = localStorage.getItem(KEY);
  if (!raw) return;
  try {
    Object.assign(db, JSON.parse(raw));
  } catch (e) {
    console.error("저장 데이터 읽기 실패:", e);
  }
}

function save() { localStorage.setItem(KEY, JSON.stringify(db)); }

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

/* === 프로젝트: 추가 (이름+장르 둘 다 같으면 중복) === */
function addProject() {
  const name = document.getElementById("p-name").value.trim();
  const genre = document.getElementById("p-genre").value.trim();
  if (!name) return;

  const dup = db.projects.find(p => p.name === name && p.genre === genre);
  if (dup) {
    showProjectWarn(name, genre);
    return;
  }

  const newId = uid();
  db.projects.push({ id: newId, name, genre, createdAt: Date.now() });
  save();
  document.getElementById("p-name").value = "";
  document.getElementById("p-genre").value = "";
  clearWarn("p-warn");
  currentProjectId = newId;        // 새 프로젝트 자동 선택
  renderCriteria();
  closeProjectModal();
  if (cabinetOpen) switchTab(currentTab);
}

function showProjectWarn(name, genre) {
  const warn = document.getElementById("p-warn");
  warn.style.display = "block";
  warn.innerHTML =
    '<div class="warn-msg">\'' + esc(name) +
    (genre ? ' (' + esc(genre) + ')' : '') +
    '\'\ub294 \uc774\ubbf8 \uc788\ub294 \ud504\ub85c\uc81d\ud2b8\uc608\uc694.</div>';
}

/* === 프로젝트: 삭제 (확인 모달) === */
function deleteProject(id) {
  const p = db.projects.find(x => x.id === id);
  openModal(
    "\ud504\ub85c\uc81d\ud2b8 \uc0ad\uc81c",
    "'" + (p ? p.name : "") + "' \ud504\ub85c\uc81d\ud2b8\ub97c \uc0ad\uc81c\ud560\uae4c\uc694?",
    () => {
      db.projects = db.projects.filter(x => x.id !== id);
      save();
      renderCriteria();
    }
  );
}

/* === 프로젝트: 현재 선택 상태 === */
let currentTab = "glossary";
const TABS = ["glossary", "style", "character", "qa"];

function switchTab(name) {
  currentTab = name;
  TABS.forEach(t => {
    if (name === "style") renderDecisions();
    if (name === "character") renderCharacters();
    if (name === "qa") renderFindings();
    document.getElementById(t + "-section").style.display = (t === name) ? "block" : "none";
  });
  document.querySelectorAll(".tab-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.tab === name);
  });
}  
let currentProjectId = null;
let projectChosen = false;

function selectProject(id) {
  currentProjectId = id;
  projectChosen = true;
  renderProjectArea();
}
function showSelector() { projectChosen = false; renderProjectArea(); }

function projectName(id) {
  if (id === null) return "공통";
  const p = db.projects.find(p => p.id === id);
  return p ? p.name : "공통";
}
function projectGenre(id) {
  if (id === null) return "모든 작업 공용";
  const p = db.projects.find(p => p.id === id);
  return p ? p.genre : "";
}

/* === 프로젝트: 화면 전환 === */
function renderProjectArea() {
  const band = document.getElementById("p-band");
  const selectEl = document.getElementById("p-select");
  const glossary = document.getElementById("glossary-section");

  if (projectChosen) {
    selectEl.style.display = "none";
    document.getElementById("tabs").style.display = "flex";
    switchTab(currentTab);
    band.style.display = "flex";
    const genre = projectGenre(currentProjectId);
    band.innerHTML =
      '<div class="term-main">' + esc(projectName(currentProjectId)) +
      (genre ? ' <span class="genre-pill">' + esc(genre) + '</span>' : '') + '</div>' +
      '<button id="p-change" class="del">\ubc14\uafb8\uae30</button>';
    document.getElementById("p-change").onclick = showSelector;
    clearWarn("g-warn");
    renderTerms();
  } else {
    band.style.display = "none";
    glossary.style.display = "none";
    document.getElementById("tabs").style.display = "none";
    selectEl.style.display = "block";
    renderProjects();
  }
}

/* === 검사 기준 드롭다운 채우기 === */
function renderCriteria() {
  const sel = document.getElementById("criteria-select");
  const keep = currentProjectId === null ? "" : currentProjectId;
  sel.innerHTML =
    '<option value="">공통 (모든 작업)</option>' +
    db.projects.map(p =>
      '<option value="' + p.id + '">' + esc(p.name) + (p.genre ? " · " + esc(p.genre) : "") + '</option>'
    ).join("");
  sel.value = keep;
}

/* === 서랍장 열고 닫기 === */
let cabinetOpen = false;
function toggleCabinet() {
  cabinetOpen = !cabinetOpen;
  document.getElementById("cabinet").style.display = cabinetOpen ? "block" : "none";
  document.getElementById("cabinet-toggle").innerHTML =
    cabinetOpen ? '<i class="ti ti-x"></i> 서랍장 닫기' : '<i class="ti ti-folders"></i> 서랍장 열기';
  if (cabinetOpen) switchTab(currentTab);
}

/* === 새 프로젝트 모달 === */
function openProjectModal() {
  document.getElementById("p-name").value = "";
  document.getElementById("p-genre").value = "";
  clearWarn("p-warn");
  document.getElementById("pmodal-overlay").style.display = "flex";
}
function closeProjectModal() {
  document.getElementById("pmodal-overlay").style.display = "none";
}

/* === 프로젝트 이름 입력 시 장르 자동 채움 === */
function autofillGenre() {
  const name = document.getElementById("p-name").value.trim();
  const match = db.projects.find(p => p.name === name);
  if (match && match.genre) document.getElementById("p-genre").value = match.genre;
}

/* === 글로서리: 추가 시도 === */
function tryAddTerm() {
  const source = document.getElementById("g-source").value.trim();
  const target = document.getElementById("g-target").value.trim();
  if (!source || !target) return;

  const candidates = db.terms.filter(t =>
    t.source === source &&
    (t.projectId === currentProjectId || t.projectId === null)
  );

  if (candidates.length === 0) { commitNewTerm(source, target); return; }

  const exact = candidates.find(t => t.target === target);
  if (exact) { showTermWarn(source, target, candidates, true); return; }

  showTermWarn(source, target, candidates, false);
}

function commitNewTerm(source, target) {
  db.terms.push({
    id: uid(),
    projectId: currentProjectId,
    source, target,
    status: document.getElementById("g-status").value,
    note: document.getElementById("g-note").value.trim(),
    createdAt: Date.now()
  });

    '\'\uac00 \uc774\ubbf8 \uc788\uc5b4\uc694. \ub36e\uc5b4\uc4f8 \ub300\uc0c1\uc744 \uace0\ub974\uac70\ub098 \uc2e0\uaddc\ub85c \ucd94\uac00\ud558\uc138\uc694.</div>';
  candidates.forEach(t => {

        '<span>' + esc(t.source) + ' \u2192 <b>' + esc(t.target) + '</b> ' +
        '<span class="where">[' + esc(where) + ']</span></span>' +
        '<button onclick="overwriteTerm(\'' + t.id + '\')">\uc774\uac78 \ub36e\uc5b4\uc4f0\uae30</button>' +

    escAttr(source) + '\',\'' + escAttr(target) + '\')">\uc2e0\uaddc\ub85c \ucd94\uac00</button>';
  warn.innerHTML = html;
}

/* === 글로서리: CSV 올리기 === */
function importGlossary(file) {
  const overwrite = document.getElementById("g-import-overwrite").checked;
  const status = document.getElementById("g-import-status");

  Papa.parse(file, {
    header: true,
    skipEmptyLines: true,
    complete: (result) => {
      let added = 0, skipped = 0, updated = 0;

      result.data.forEach(row => {
        const source = (row.source || "").trim();
        const target = (row.target || "").trim();
        if (!source || !target) return;

        // 같은 원문이 현재 범위에 있나
        const existing = db.terms.find(t =>
          t.source === source && t.projectId === currentProjectId
        );

        if (existing) {
          if (overwrite) {
            existing.target = target;
            existing.status = (row.status || existing.status || "권장").trim();
            existing.note = (row.note || "").trim();
            updated++;
          } else {
            skipped++;
          }
        } else {
          db.terms.push({
            id: uid(),
            projectId: currentProjectId,
            source, target,
            status: (row.status || "권장").trim(),
            note: (row.note || "").trim(),
            createdAt: Date.now()
          });
          added++;
        }
      });

      save();
      renderTerms();
      status.textContent =
        added + "개 추가" +
        (updated ? ", " + updated + "개 덮어씀" : "") +
        (skipped ? ", " + skipped + "개 건너뜀" : "");
    },
    error: (err) => { status.textContent = "읽기 실패: " + err.message; }
  });
}
  
/* === API 키 (브라우저에만 저장) === */
const KEY_STORE = "lince-api-key";

function saveKey() {
  const k = document.getElementById("api-key").value.trim();
  if (!k) return;
  localStorage.setItem(KEY_STORE, k);
  document.getElementById("key-status").textContent = "키 저장됨 (이 브라우저에만)";
}

function loadKey() {
  return localStorage.getItem(KEY_STORE) || "";
}

/* === 연결 테스트 (CORS 막히는지 확인용) === */
async function testKey() {
  const key = loadKey() || document.getElementById("api-key").value.trim();
  const status = document.getElementById("key-status");
  if (!key) { status.textContent = "키를 먼저 입력하세요."; return; }

  status.textContent = "테스트 중…";
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": key,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 20,
        messages: [{ role: "user", content: "responde solo: ok" }]
      })
    });
    if (!res.ok) {
      const t = await res.text();
      status.textContent = "응답 오류 " + res.status + ": " + t.slice(0, 120);
      return;
    }
    const data = await res.json();
    const txt = (data.content && data.content[0] && data.content[0].text) || "(응답 비어있음)";
    status.textContent = "연결 성공! 응답: " + txt;
  } catch (e) {
    status.textContent = "호출 실패 (CORS일 가능성): " + e.message;
  }
}
  
/* === 내보내기 === */
function exportJSON() {
  const blob = new Blob([JSON.stringify(db, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "spanish-lqa-backup.json"; a.click();
  URL.revokeObjectURL(url);
}

/* === 헬퍼 === */
function esc(s) {
  return String(s).replace(/[&<>"]/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}
function escAttr(s) {
  return String(s).replace(/\\/g, "\\\\").replace(/'/g, "\\'");
}
